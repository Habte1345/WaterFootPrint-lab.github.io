<svg viewBox="0 0 560 560" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Topographic contour illustration of a watershed">
  <defs>
    <style>
      .ring{ fill:none; stroke-linecap:round; }
    </style>
  </defs>

  <!-- outer faint contour rings -->
  <path class="ring" d="M70 300c0-95 70-180 195-200 110-18 215 40 245 140 26 88-10 175-95 215-100 47-205 32-275-35C75 380 70 345 70 300Z"
        stroke="#DCD2B8" stroke-width="1.6"/>
  <path class="ring" d="M105 300c0-78 58-148 165-165 92-15 178 33 203 116 21 73-9 145-80 178-83 39-170 27-228-29-40-39-60-66-60-100Z"
        stroke="#CBE3E2" stroke-width="2"/>
  <path class="ring" d="M140 300c0-62 47-118 136-132 75-12 144 27 165 95 17 58-7 116-65 143-67 31-138 22-185-23-32-31-51-54-51-83Z"
        stroke="#9ED1D1" stroke-width="2.2"/>

  <!-- highlighted "water footprint" contour -->
  <path class="ring" d="M178 302c0-47 35-90 103-101 57-9 110 21 126 73 13 44-5 89-50 110-51 24-105 17-141-18-25-24-38-42-38-64Z"
        stroke="#1C7C82" stroke-width="3"/>

  <!-- innermost core -->
  <path d="M214 303c0-30 23-58 67-65 37-6 71 14 81 47 8 28-3 57-32 71-33 16-68 11-91-12-16-16-25-27-25-41Z"
        fill="#102A38"/>

  <!-- branching drainage network -->
  <g stroke="#1C7C82" stroke-width="1.4" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M249 333c-30 38-70 60-122 64"/>
    <path d="M249 333c-12 46-12 92 8 134"/>
    <path d="M281 333c34 30 78 44 128 40"/>
    <path d="M281 333c20 40 24 86 10 130"/>
    <path d="M127 397c-24 8-46 22-62 42"/>
    <path d="M409 373c22 4 44 14 60 30"/>
  </g>
  <g fill="#1C7C82" opacity="0.9">
    <circle cx="127" cy="397" r="3"/>
    <circle cx="257" cy="467" r="3"/>
    <circle cx="291" cy="463" r="3"/>
    <circle cx="409" cy="373" r="3"/>
    <circle cx="65" cy="439" r="2.4"/>
    <circle cx="469" cy="403" r="2.4"/>
  </g>

  <!-- small index labels, like a real survey map -->
  <g font-family="IBM Plex Mono, monospace" font-size="10" fill="#5B6B72" opacity="0.85">
    <text x="372" y="180">+148m</text>
    <text x="92" y="230">+112m</text>
    <text x="220" y="455">+86m</text>
